<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RAG-ассистент</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0c0f13;
      padding: 20px;
      line-height: 1.5;
      color: #e7e2e5;
    }

    .container {
      max-width: 700px;
      margin: 20px auto;
      background: #31222b;
      border: 1px solid #4a3340;
      border-radius: 25px;
      padding: 24px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
    }

    .tabs {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      border-bottom: 1px solid #4a3340;
      padding-bottom: 8px;
    }

    .tab-btn {
      background: none;
      border: none;
      font-size: 1.2rem;
      font-weight: 600;
      color: #a89aa4;
      cursor: pointer;
      padding: 8px 16px;
      border-radius: 20px;
      transition: all 0.2s;
    }

    .tab-btn.active {
      background: #8D4071;
      color: white;
      box-shadow: 0 2px 8px rgba(141, 64, 113, 0.4);
    }

    .panel {
      display: none;
    }

    .panel.active-panel {
      display: block;
    }

    .workarea {
      background: #31222b;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.05);
      border: 1px solid #5a3a4c;
    }

    .chat-history {
      max-height: 400px;
      overflow-y: auto;
      margin-bottom: 20px;
      padding-right: 8px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .chat-message {
      background: #21161c;
      border-radius: 16px;
      padding: 12px 16px;
      border-left: 3px solid #8D4071;
    }

    .chat-question {
      font-weight: 600;
      color: #e7e2e5;
      margin-bottom: 6px;
      word-break: break-word;
    }

    .chat-answer {
      color: #c4b5c0;
      font-size: 0.95rem;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .button-row {
      display: flex;
      gap: 12px;
      margin-top: 18px;
      justify-content: center;
    }

    button {
      background: #3a1424;
      color: #ffffff;
      border: none;
      padding: 12px 18px;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover {
      background: #522033;
    }

    button:disabled {
      background: #6f6670;
      cursor: not-allowed;
    }

    .clear-btn {
      background: #2c1a24;
      font-size: 1.3rem;
      padding: 8px 18px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    textarea {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #8D4071;
      border-radius: 12px;
      background: #21161c;
      color: #e7e2e5;
      font-size: 1rem;
      min-height: 100px;
      resize: vertical;
    }

    textarea:focus {
      outline: none;
      border-color: #8D4071;
      background: #25181f;
    }

    .hint {
      font-size: 0.82rem;
      color: #a89aa4;
      margin-top: 6px;
      text-align: right;
    }

    .loading {
      text-align: center;
      color: #a89aa4;
      margin-top: 14px;
      display: none;
    }

    .loading.visible {
      display: block;
    }

    .error {
      color: #ffb3bd;
      background: #3a151b;
      border: 1px solid #6b2733;
      padding: 10px 12px;
      border-radius: 10px;
      margin-top: 12px;
      display: none;
    }

    .error.visible {
      display: block;
    }

    * {
      scrollbar-width: thin;
      scrollbar-color: #8D4071 #2a1020;
    }
    *::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    *::-webkit-scrollbar-track {
      background: #2a1020;
      border-radius: 10px;
    }
    *::-webkit-scrollbar-thumb {
      background: #8D4071;
      border-radius: 10px;
    }
    *::-webkit-scrollbar-thumb:hover {
      background: #c05a9e;
    }

    .trainer-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 20px;
    }
    .question-counter {
      background: #21161c;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.9rem;
      color: #e7e2e5;
    }
    .question-text {
      background: #21161c;
      padding: 16px;
      border-radius: 16px;
      margin: 16px 0;
      font-size: 1.1rem;
      border-left: 4px solid #8D4071;
    }
    .trainer-input {
      width: 100%;
      padding: 12px;
      background: #21161c;
      border: 1px solid #8D4071;
      border-radius: 12px;
      color: white;
      margin-top: 8px;
      margin-bottom: 20px;
    }
    .result-area {
      margin-top: 20px;
      padding: 12px;
      background: #19070f;
      border-radius: 12px;
    }
    .explanation {
      margin-top: 10px;
      font-style: italic;
      color: #d4b8c8;
    }
    .trainer-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 20px;
    }
    .trainer-buttons button {
      flex: 1;
      margin: 0;
    }

    .not-found-msg {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 18px 12px;
      background: #1e0f18;
      border: 1px dashed #6b3055;
      border-radius: 14px;
      color: #a87090;
      font-size: 0.95rem;
      text-align: center;
    }
    .not-found-msg .nf-icon { font-size: 1.8rem; }
    .not-found-msg .nf-hint { font-size: 0.82rem; color: #7a5568; margin-top: 4px; }
    .nf-topics {
      list-style: none;
      margin-top: 6px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      text-align: left;
      width: 100%;
      padding: 0 8px;
    }
    .nf-topics li {
      font-size: 0.85rem;
      color: #9d6882;
      padding: 5px 10px;
      background: #2a1020;
      border-radius: 8px;
    }

    #submitBtn, #checkBtn, #navPrevBtn, #navNextBtn, .clear-btn {
      border: 2px solid #ff69b4;
      transition: border-color 0.2s;
    }
    #submitBtn:hover, #checkBtn:hover, #navPrevBtn:hover, #navNextBtn:hover, .clear-btn:hover {
      border-color: #ff1493;
    }

    .settings-button {
      position: fixed;
      right: 22px;
      top: 22px;
      z-index: 1000;
      width: 46px;
      height: 46px;
      border: 2px solid #ff69b4;
      border-radius: 50%;
      background: #3a1424;
      color: #ffffff;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, color 0.2s;
    }
    .settings-button.llm-active {
      background: #ffffff;
      color: #ff69b4;
    }
    .settings-button:hover {
      background: #522033;
      border-color: #ff1493;
    }
    .settings-button.llm-active:hover {
      background: #f0f0f0;
      color: #ff1493;
    }
    .settings-panel {
      position: fixed;
      right: 22px;
      top: 78px;
      z-index: 1000;
      width: 320px;
      padding: 18px;
      border-radius: 18px;
      background: #31222b;
      border: 1px solid #8D4071;
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.42);
      display: none;
    }
    .settings-panel.open {
      display: block;
    }
    .settings-title {
      font-weight: 800;
      margin-bottom: 14px;
      color: #e7e2e5;
    }
    .llm-switch-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      cursor: pointer;
    }
    .llm-switch-row span {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .llm-switch-row small {
      color: #a89aa4;
      font-size: 0.78rem;
    }
    .llm-switch-row input {
      width: 48px;
      height: 24px;
      cursor: pointer;
      accent-color: #8D4071;
    }
    .settings-note {
      margin-top: 14px;
      font-size: 0.78rem;
      color: #a89aa4;
      line-height: 1.4;
    }
    .llm-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 10px;
      padding: 5px 10px;
      border-radius: 999px;
      background: #2b1d4a;
      color: #d9c8ff;
      font-size: 0.78rem;
      font-weight: 700;
    }
    .llm-badge.off {
      background: #2a2028;
      color: #a89aa4;
    }
    .answer-title {
      color: #ffffff;
      font-weight: 800;
      margin-top: 6px;
      margin-bottom: 4px;
    }
    .answer-divider {
      height: 1px;
      background: #4a3340;
      margin: 10px 0;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="tabs">
    <button class="tab-btn active" data-tab="assistant">Ассистент</button>
    <button class="tab-btn" data-tab="trainer">Тренажёр</button>
    <button class="settings-button" id="settingsButton" type="button" title="Настройки">LLM</button>
  </div>

  <div class="settings-panel" id="settingsPanel">
    <div class="settings-title">Настройки</div>
    <label class="llm-switch-row">
      <span>
        <strong>Локальная LLM</strong>
        <small>Улучшает формулировки ответов и тренажёра</small>
      </span>
      <input id="llmToggle" type="checkbox">
    </label>
    <div class="settings-note">
      Если LLM выключена или недоступна, система работает по старой схеме
    </div>
  </div>

  <div id="assistantPanel" class="panel active-panel">
    <div class="workarea">
      <div id="chatHistory" class="chat-history"></div>
      <form id="questionForm">
        <div class="form-group">
          <textarea id="question" name="question" required minlength="1" maxlength="1000" placeholder="Ваш вопрос..."></textarea>
          <div class="hint"><span id="charCount">0</span>/1000</div>
        </div>
        <div class="button-row">
          <button type="submit" id="submitBtn">Отправить</button>
          <button type="button" id="clearHistoryBtn" class="clear-btn" title="Очистить историю">🗑️</button>
        </div>
      </form>
      <div class="loading" id="loading">Думаю...</div>
      <div class="error" id="error"></div>
    </div>
  </div>

  <div id="trainerPanel" class="panel">
    <div class="workarea">
      <div class="trainer-header">
        <div class="question-counter" id="questionCounter">Вопрос: 0 / 0</div>
        <button id="trainerResetBtn" class="clear-btn" title="Сбросить прогресс" style="background: #2c1a24; font-size: 1.2rem; padding: 4px 12px; border-radius: 20px;">🗑️</button>
      </div>
      <div id="trainerQuestionArea">
        <div class="question-text" id="currentQuestion">Загрузка вопросов...</div>
        <input type="text" id="trainerAnswer" class="trainer-input" placeholder="Ваш ответ..." autocomplete="off">
        <div id="trainerResult" class="result-area" style="display: none;"></div>
        <div class="trainer-buttons">
          <button id="navPrevBtn" disabled>Предыдущий вопрос</button>
          <button id="checkBtn">Проверить</button>
          <button id="navNextBtn">Следующий вопрос</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  // ---------- LLM ----------
  const LLM_STORAGE_KEY = 'ragUseLlm';
  function getLlmEnabled() {
    const saved = localStorage.getItem(LLM_STORAGE_KEY);
    return saved === null ? true : saved === 'true';
  }
  function setLlmEnabled(value) {
    localStorage.setItem(LLM_STORAGE_KEY, String(Boolean(value)));
  }
  function getLlmBadgeHtml(llmUsed) {
    if (llmUsed) return '<div class="llm-badge">✨ Сформулировано локальной LLM</div>';
    return '<div class="llm-badge off">LLM выключена или недоступна — классический RAG</div>';
  }
  function initSettingsPanel() {
    const settingsButton = document.getElementById('settingsButton');
    const settingsPanel = document.getElementById('settingsPanel');
    const llmToggle = document.getElementById('llmToggle');
    if (!settingsButton || !settingsPanel || !llmToggle) return;
    function updateButtonState() {
      if (getLlmEnabled()) settingsButton.classList.add('llm-active');
      else settingsButton.classList.remove('llm-active');
    }
    llmToggle.checked = getLlmEnabled();
    updateButtonState();
    settingsButton.addEventListener('click', () => settingsPanel.classList.toggle('open'));
    llmToggle.addEventListener('change', () => {
      setLlmEnabled(llmToggle.checked);
      updateButtonState();
    });
    document.addEventListener('click', (event) => {
      if (!settingsPanel.contains(event.target) && !settingsButton.contains(event.target))
        settingsPanel.classList.remove('open');
    });
  }
  document.addEventListener('DOMContentLoaded', initSettingsPanel);

  // ---------- Переключение вкладок ----------
  const tabBtns = document.querySelectorAll('.tab-btn');
  const panels = {
    assistant: document.getElementById('assistantPanel'),
    trainer: document.getElementById('trainerPanel')
  };
  function switchTab(tabId) {
    Object.keys(panels).forEach(id => panels[id].classList.remove('active-panel'));
    panels[tabId].classList.add('active-panel');
    tabBtns.forEach(btn => {
      if (btn.dataset.tab === tabId) btn.classList.add('active');
      else btn.classList.remove('active');
    });
  }
  tabBtns.forEach(btn => btn.addEventListener('click', () => switchTab(btn.dataset.tab)));

  // ---------- История чата ----------
  let chatHistory = [];
  function loadChatHistory() {
    const saved = localStorage.getItem('assistantChatHistory');
    if (saved) try { chatHistory = JSON.parse(saved); } catch(e) { chatHistory = []; }
    renderChatHistory();
  }
  function saveChatHistory() { localStorage.setItem('assistantChatHistory', JSON.stringify(chatHistory)); }
  function renderChatHistory() {
    const container = document.getElementById('chatHistory');
    if (!container) return;
    if (chatHistory.length === 0) { container.innerHTML = ''; return; }
    const html = chatHistory.map(item => {
      const answerHtml = item.answer === '__NOT_FOUND__'
        ? `<div class="not-found-msg"><span class="nf-icon">🔍</span><span>По этому запросу ничего не найдено в учебнике</span><span class="nf-hint">Задайте вопрос по одной из доступных тем:</span><ul class="nf-topics"><li>Свободные деревья</li><li>Ориентированные, упорядоченные и бинарные деревья</li><li>Представление деревьев в программах</li><li>Деревья сортировки</li><li>Специальные деревья</li><li>Кратчайший остов</li></ul></div>`
        : `<div class="chat-answer">📖 ${escapeHtml(item.answer)}</div>${getLlmBadgeHtml(Boolean(item.llmUsed))}`;
      return `<div class="chat-message"><div class="chat-question">❓ ${escapeHtml(item.question)}</div>${answerHtml}</div>`;
    }).join('');
    container.innerHTML = html;
    container.scrollTop = container.scrollHeight;
  }
  function addToHistory(question, answer, llmUsed = false) {
    chatHistory.push({ question, answer, llmUsed });
    saveChatHistory();
    renderChatHistory();
  }
  function clearHistory() { chatHistory = []; saveChatHistory(); renderChatHistory(); }
  function escapeHtml(value) {
    return String(value).replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;').replaceAll("'", '&#039;');
  }

  // ---------- Ассистент ----------
  const form = document.getElementById('questionForm');
  const questionInput = document.getElementById('question');
  const charCount = document.getElementById('charCount');
  const submitBtn = document.getElementById('submitBtn');
  const loading = document.getElementById('loading');
  const errorBox = document.getElementById('error');
  questionInput.addEventListener('input', () => charCount.textContent = questionInput.value.length);
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const questionText = questionInput.value.trim();
    if (!questionText) return;
    errorBox.classList.remove('visible');
    loading.classList.add('visible');
    submitBtn.disabled = true;
    try {
      const response = await fetch('/api/question', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question: questionText, use_llm: getLlmEnabled() })
      });
      if (!response.ok) throw new Error(`Ошибка ${response.status}`);
      const data = await response.json();
      const isNotFound = (!data.short || !data.short.length) && (!data.long || !data.long.length);
      if (isNotFound) {
        addToHistory(questionText, '__NOT_FOUND__', false);
      } else {
        let answerText = '';
        if (data.llm_used && (data.answer_short || data.answer_long)) {
          if (data.answer_short) answerText += 'Краткий ответ:\n' + data.answer_short;
          if (data.answer_long) {
            if (answerText) answerText += '\n\n';
            answerText += 'Подробный ответ:\n' + data.answer_long;
          }
        } else {
          if (data.short?.length) answerText += 'Краткий ответ:\n' + data.short.join('\n');
          if (data.long?.length) {
            if (answerText) answerText += '\n\n';
            answerText += 'Подробный ответ:\n' + data.long.join('\n');
          }
        }
        addToHistory(questionText, answerText, Boolean(data.llm_used));
      }
      questionInput.value = '';
      charCount.textContent = '0';
    } catch (err) {
      errorBox.textContent = ` ${err.message}`;
      errorBox.classList.add('visible');
    } finally {
      loading.classList.remove('visible');
      submitBtn.disabled = false;
    }
  });
  const clearHistoryBtn = document.getElementById('clearHistoryBtn');
  if (clearHistoryBtn) clearHistoryBtn.addEventListener('click', clearHistory);
  loadChatHistory();

  // ---------- Тренажёр (бесконечная лента, счётчик прогресса) ----------
  let allQuestions = [];          // исходные вопросы {id, question}
  let questionsQueue = [];        // бесконечная очередь вопросов (перемешанные блоки)
  let currentIndex = -1;          // текущий индекс в очереди
  let totalShown = 0;             // максимальный достигнутый индекс+1 (количество показанных вопросов)

  const questionCounterSpan = document.getElementById('questionCounter');
  const currentQuestionDiv = document.getElementById('currentQuestion');
  const trainerAnswerInput = document.getElementById('trainerAnswer');
  const checkBtn = document.getElementById('checkBtn');
  const navPrevBtn = document.getElementById('navPrevBtn');
  const navNextBtn = document.getElementById('navNextBtn');
  const trainerResultDiv = document.getElementById('trainerResult');
  const trainerResetBtn = document.getElementById('trainerResetBtn');
  let currentQuestionId = null;

  function shuffleArray(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  // Добавляет новый блок перемешанных вопросов в конец очереди
  function appendBlock() {
    const block = allQuestions.map(q => ({ id: q.id, questionText: q.question }));
    shuffleArray(block);
    questionsQueue.push(...block);
  }

  function ensureQueueLength(neededIndex) {
    while (neededIndex >= questionsQueue.length) {
      appendBlock();
    }
  }

  function updateUI() {
    if (questionsQueue.length === 0 || currentIndex < 0) {
      questionCounterSpan.textContent = 'Вопрос: 0 / 0';
      currentQuestionDiv.textContent = 'Нет вопросов';
      navPrevBtn.disabled = true;
      navNextBtn.disabled = true;
      return;
    }
    const currentNum = currentIndex + 1;
    questionCounterSpan.textContent = `Вопрос: ${currentNum} / ${totalShown}`;
    const q = questionsQueue[currentIndex];
    currentQuestionDiv.innerHTML = `<div>${escapeHtml(q.questionText)}</div>`;
    currentQuestionId = q.id;
    trainerAnswerInput.value = '';
    trainerResultDiv.style.display = 'none';
    trainerResultDiv.innerHTML = '';
    checkBtn.disabled = false;
    navPrevBtn.disabled = (currentIndex === 0);
    navNextBtn.disabled = false;
  }

  async function loadAllQuestions() {
    try {
      const response = await fetch('/api/trainer/questions');
      if (!response.ok) throw new Error('Не удалось загрузить список вопросов');
      const data = await response.json();
      if (!data.length) {
        currentQuestionDiv.textContent = 'Нет вопросов в базе данных';
        return;
      }
      allQuestions = data;
      // Инициализируем очередь первым блоком
      questionsQueue = [];
      appendBlock();  // первый блок
      currentIndex = 0;
      totalShown = 1;
      updateUI();
    } catch (err) {
      console.error(err);
      currentQuestionDiv.textContent = 'Ошибка загрузки вопросов. Попробуйте позже.';
    }
  }

  function nextQuestion() {
    if (allQuestions.length === 0) return;
    // Переход к следующему вопросу
    const newIndex = currentIndex + 1;
    ensureQueueLength(newIndex);
    currentIndex = newIndex;
    if (currentIndex + 1 > totalShown) {
      totalShown = currentIndex + 1;
    }
    updateUI();
  }

  function prevQuestion() {
    if (allQuestions.length === 0) return;
    if (currentIndex > 0) {
      currentIndex--;
      updateUI();
    }
  }

  function resetProgress() {
    if (allQuestions.length === 0) return;
    // Полный сброс: очищаем очередь, создаём новый первый блок, сбрасываем индекс
    questionsQueue = [];
    appendBlock();
    currentIndex = 0;
    totalShown = 1;
    updateUI();
  }

  async function checkAnswer() {
    const answer = trainerAnswerInput.value.trim();
    if (!answer) {
      alert('Введите ответ');
      return;
    }
    checkBtn.disabled = true;
    try {
      const response = await fetch('/api/trainer/check', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          question_id: currentQuestionId,
          answer: answer,
          use_llm: getLlmEnabled()
        })
      });
      if (!response.ok) throw new Error('Ошибка проверки');
        const data = await response.json();
        let statusHtml = '';
        if (data.status === 'Верно') statusHtml = '<span style="color:#8bc34a;">✓ Верно!</span>';
        else if (data.status === 'Верно частично') statusHtml = '<span style="color:#ffb74d;">⚠️ Верно частично</span>';
        else statusHtml = '<span style="color:#e57373;">✗ Неверно</span>';

        let correctAnswerHtml = `<div class="explanation"><strong>Эталонный ответ:</strong><br>${escapeHtml(data.correct_answer)}</div>`;
        let explanationHtml = '';
        if (data.explanation && data.status !== 'Верно') {
            explanationHtml = `<div class="explanation"><strong>Объяснение:</strong><br>${escapeHtml(data.explanation)}</div>`;
        }
        const trainerLlmBadge = data.llm_used ? '<div class="llm-badge">✨ Объяснение от локальной LLM</div>' : '';

        trainerResultDiv.innerHTML = `<div>${statusHtml}</div>${correctAnswerHtml}${explanationHtml}${trainerLlmBadge}`;
        trainerResultDiv.style.display = 'block';
    } catch (err) {
      trainerResultDiv.innerHTML = `<div class="error" style="display:block;">Ошибка: ${err.message}</div>`;
      trainerResultDiv.style.display = 'block';
    } finally {
      checkBtn.disabled = false;
    }
  }

  navNextBtn.addEventListener('click', nextQuestion);
  navPrevBtn.addEventListener('click', prevQuestion);
  checkBtn.addEventListener('click', checkAnswer);
  trainerResetBtn.addEventListener('click', resetProgress);
  loadAllQuestions();
</script>
</body>
</html>
