<!DOCTYPE html>
<html lang="ru">
<head>

<!--  рамка для кнопки отправить-->
  <style>
  #submitBtn {
    border: 3px solid #8D407B;
    border-radius: 12px;
    padding: 10px 20px;      /* добавит воздух внутри */
    background-color: #4a3340; /* для контраста */
    cursor: pointer;
  }
  </style>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RAG-ассистент</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0c0f13;
      padding: 20px;
      line-height: 1.5;
      color: #e7e2e5;
    }

    .container {
      max-width: 600px;
      margin: 20px auto;
      background: #31222b;
      border: 1px solid #4a3340;
      border-radius: 25px;
      padding: 24px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin-bottom: 20px;
      color: #f1edf0;
      font-size: 1.6rem;
      text-align: center;
      font-weight: 600;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: #ffffff;
    }

    textarea {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #8D4071;
      border-radius: 12px;
      background: #21161c;
      color: #e7e2e5;
      font-size: 1rem;
      min-height: 140px;
      resize: vertical;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }

    textarea::placeholder {
      color: #8f7f89;
    }

    textarea:focus {
      outline: none;
      border-color: #8D4071;
      box-shadow: 0 0 0 3px rgba(154, 111, 132, 0.18);
      background: #25181f;
    }

    .hint {
      font-size: 0.82rem;
      color: #a89aa4;
      margin-top: 6px;
      text-align: right;
    }

    button {
      display: block;
      background: #3a1424;
      color: #ffffff;
      border: none;
      margin: 18px auto 0;
      padding: 12px 18px;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      width: 50%;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 6px 18px rgba(58, 20, 36, 0.35);
    }

    button:hover {
      background: #522033;
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    button:disabled {
      background: #6f6670;
      color: #d7d1d5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .answer-box {
      margin-top: 24px;
      padding: 16px;
      background: #19070f;
      border: 1px solid #8D4071;
      border-radius: 14px;
      display: none;
    }

    .answer-box.visible {
      display: block;
    }

    .answer-label {
      font-weight: 600;
      margin-bottom: 8px;
      color: #ffffff;
    }

    .answer-text {
      white-space: pre-wrap;
      color: #e4dfe2;
    }

    .error {
      color: #ffb3bd;
      background: #3a151b;
      border: 1px solid #6b2733;
      padding: 10px 12px;
      border-radius: 10px;
      margin-top: 12px;
      display: none;
    }

    .error.visible {
      display: block;
    }

    .loading {
      text-align: center;
      color: #a89aa4;
      margin-top: 14px;
      display: none;
    }

    .loading.visible {
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>RAG v1</h1>

    <form id="questionForm">
      <div class="form-group">
        <label for="question"></label>
        <textarea
          id="question"
          name="question"
          required
          minlength="1"
          maxlength="1000"
          placeholder="Ваш вопрос..."></textarea>
        <div class="hint"><span id="charCount">0</span>/1000</div>
      </div>

      <button type="submit" id="submitBtn">Отправить</button>
    </form>

    <div class="loading" id="loading">Думаю...</div>
    <div class="error" id="error"></div>

    <div class="answer-box" id="answerBox">
      <div class="answer-label">Ответ:</div>
      <div class="answer-text" id="answerText"></div>
    </div>
  </div>

  <script>
    const form = document.getElementById('questionForm');
    const questionInput = document.getElementById('question');
    const charCount = document.getElementById('charCount');
    const submitBtn = document.getElementById('submitBtn');
    const loading = document.getElementById('loading');
    const errorBox = document.getElementById('error');
    const answerBox = document.getElementById('answerBox');
    const answerText = document.getElementById('answerText');

    questionInput.addEventListener('input', () => {
      charCount.textContent = questionInput.value.length;
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      errorBox.classList.remove('visible');
      answerBox.classList.remove('visible');
      loading.classList.add('visible');
      submitBtn.disabled = true;

      const payload = {
        question: questionInput.value.trim()
      };

      try {
        const response = await fetch('/api/question', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (!response.ok) {
          const errData = await response.json().catch(() => ({}));
          throw new Error(errData.detail || `Ошибка ${response.status}`);
        }

        const data = await response.json();
        const parts = [];

        if (data.short?.length) parts.push('Кратко:\n' + data.short.join('\n'));
        if (data.long?.length) parts.push('Подробнее:\n' + data.long.join('\n'));

        answerText.textContent = parts.join('\n\n') || 'Нет ответа';
        answerBox.classList.add('visible');
        questionInput.value = '';
        charCount.textContent = '0';

      } catch (err) {
        errorBox.textContent = ` ${err.message}`;
        errorBox.classList.add('visible');
        console.error('Request failed:', err);
      } finally {
        loading.classList.remove('visible');
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
